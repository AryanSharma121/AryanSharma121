<svg viewBox="0 0 900 340" width="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes sl { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
      @keyframes sr { 0%{transform:translateX(-50%)} 100%{transform:translateX(0)} }
      @keyframes pb { 0%,100%{opacity:.45} 50%{opacity:1} }
      @keyframes flk { 0%,100%{opacity:1} 91%{opacity:.7} 93%{opacity:1} 95%{opacity:.5} 97%{opacity:1} }
      @keyframes scan { 0%{transform:translateY(-5%)} 100%{transform:translateY(110%)} }
      .tl{animation:sl 24s linear infinite}
      .tr{animation:sr 18s linear infinite}
      .bp{animation:pb 3s ease-in-out infinite}
      .flk{animation:flk 5s ease-in-out infinite}
      .scan{animation:scan 7s linear infinite}
    </style>
    <clipPath id="ct"><rect x="0" y="0" width="900" height="32"/></clipPath>
    <clipPath id="cb"><rect x="0" y="308" width="900" height="32"/></clipPath>
    <clipPath id="main"><rect x="0" y="0" width="900" height="340" rx="10"/></clipPath>
  </defs>


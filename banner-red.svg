<svg viewBox="0 0 900 340" width="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes sl { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
      @keyframes sr { 0%{transform:translateX(-50%)} 100%{transform:translateX(0)} }
      @keyframes pb { 0%,100%{opacity:.4} 50%{opacity:1} }
      @keyframes flk { 0%,100%{opacity:1} 88%{opacity:.9} 90%{opacity:.4} 92%{opacity:1} 94%{opacity:.6} 96%{opacity:1} }
      @keyframes scan { 0%{transform:translateY(-5%)} 100%{transform:translateY(115%)} }
      @keyframes drip1 { 0%,30%{transform:translateY(0);opacity:1} 80%{transform:translateY(38px);opacity:.7} 81%,100%{transform:translateY(0);opacity:0} }
      @keyframes drip2 { 0%,50%{transform:translateY(0);opacity:1} 90%{transform:translateY(28px);opacity:.6} 91%,100%{transform:translateY(0);opacity:0} }
      @keyframes drip3 { 0%,20%{transform:translateY(0);opacity:1} 70%{transform:translateY(44px);opacity:.8} 71%,100%{transform:translateY(0);opacity:0} }
      @keyframes drip4 { 0%,60%{transform:translateY(0);opacity:1} 95%{transform:translateY(22px);opacity:.5} 96%,100%{transform:translateY(0);opacity:0} }
      @keyframes drip5 { 0%,40%{transform:translateY(0);opacity:1} 85%{transform:translateY(34px);opacity:.7} 86%,100%{transform:translateY(0);opacity:0} }
      @keyframes pulse-dot { 0%,100%{opacity:.3} 50%{opacity:1} }
      .tl{animation:sl 22s linear infinite}
      .tr{animation:sr 17s linear infinite}
      .bp{animation:pb 2.8s ease-in-out infinite}
      .flk{animation:flk 4.5s ease-in-out infinite}
      .scan{animation:scan 6s linear infinite}
      .d1{animation:drip1 4s ease-in infinite}
      .d2{animation:drip2 5.5s ease-in infinite 1.2s}
      .d3{animation:drip3 3.8s ease-in infinite 0.6s}
      .d4{animation:drip4 6.2s ease-in infinite 2s}
      .d5{animation:drip5 4.8s ease-in infinite 3s}
      .pd{animation:pulse-dot 1.5s ease-in-out infinite}
    </style>
    <clipPath id="ct"><rect x="0" y="0" width="900" height="32"/></clipPath>
    <clipPath id="cb"><rect x="0" y="308" width="900" height="32"/></clipPath>
    <clipPath id="main"><rect x="0" y="0" width="900" height="340" rx="10"/></clipPath>
  </defs>

